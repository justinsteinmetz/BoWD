
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Because of Winn-Dixie — A Reading Journey</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="masthead">
  <div class="masthead-label">A Reading Journey</div>
  <h1>Because of Winn-Dixie</h1>
  <div class="masthead-author">Kate DiCamillo</div>
</div>

<div class="zone-nav-wrap">
  <nav class="zone-nav">
    <button class="zone-btn active" onclick="setZone('z1')">one</button>
    <button class="zone-btn" onclick="setZone('z2')">two</button>
    <button class="zone-btn" onclick="setZone('z3')">three</button>
    <button class="zone-btn" onclick="setZone('z4')">four</button>
    <button class="zone-btn" onclick="setZone('z5')">five</button>
    <button class="zone-btn" onclick="setZone('z6')">six</button>
  </nav>
</div>

<main>

<div id="z1" class="zone active">
  <div class="entry-prompt">What do you notice first about him?</div>
  <textarea class="thinking-area" oninput="wc(this)"></textarea>
</div>

<div id="z2" class="zone">
  <div class="entry-prompt">Which word fits Opal?</div>
  <div class="word-cloud">
    <div class="w-item" onclick="mark(this)">lonely</div>
    <div class="w-item" onclick="mark(this)">hopeful</div>
    <div class="w-item" onclick="mark(this)">curious</div>
  </div>
</div>

<div id="z3" class="zone">
  <div class="entry-prompt">Who matters most?</div>
</div>

<div id="z4" class="zone">
  <div class="entry-prompt">Sweet or sad?</div>
</div>

<div id="z5" class="zone">
  <div class="entry-prompt">What changes?</div>
</div>

<div id="z6" class="zone">
  <div class="entry-prompt">What stays?</div>
  <textarea class="thinking-area" oninput="wc(this)"></textarea>
</div>

</main>

<script src="app.js"></script>
</body>
</html>
