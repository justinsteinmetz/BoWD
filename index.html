<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Because of Winn-Dixie — Reading Environment</title>

<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=Source+Sans+3&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body class="locked">

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-title">Because of Winn-Dixie</div>
    <div class="entry-prompt">Enter your name</div>

    <input 
      id="nameInput"
      placeholder="Your name"
      autocomplete="off"
      onkeydown="if(event.key==='Enter') startSession()"
    >

    <button onclick="startSession()">Start</button>
  </div>
</div>

<!-- TEACHER PANEL -->
<div id="teacher-panel">
  <button onclick="toggleAggregation()">Show / Hide</button>
  <button onclick="freezeAggregation()">Freeze</button>
  <button onclick="resetAggregation()">Reset</button>
  <button onclick="clearSpotlight()">Clear Focus</button>
</div>

<!-- HEADER -->
<div class="masthead">
  <div class="masthead-label">A Reading Journey</div>
  <h1>Because of Winn-Dixie</h1>
  <div class="masthead-author">Kate DiCamillo</div>
</div>

<!-- NAV -->
<div class="zone-nav-wrap">
  <nav id="nav" class="zone-nav"></nav>
</div>

<!-- APP -->
<main id="app"></main>

<!-- RESPONSES -->
<div id="response-panel" class="response-panel">
  <em style="opacity:0.5;">Responses will appear here</em>
</div>

<script src="zones.js"></script>
<script src="app.js"></script>

</body>
</html>
